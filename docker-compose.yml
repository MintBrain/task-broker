version: '3'

services:
  my-app:
    image: my-app  # Используем образ, который вы собрали
    container_name: my-app-container
    ports:
      - "8080:80"  # Порт для доступа к приложению
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml  # Настройки Prometheus
    ports:
      - "9090:9090"  # Порт Prometheus
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"  # Порт Grafana
    networks:
      - monitoring

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.9.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"  # Порт Elasticsearch
    networks:
      - logging

  logstash:
    image: docker.elastic.co/logstash/logstash:7.9.2
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf  # Конфигурация Logstash
    ports:
      - "5000:5000"  # Порт для приема логов
    networks:
      - logging

  kibana:
    image: docker.elastic.co/kibana/kibana:7.9.2
    container_name: kibana
    ports:
      - "5601:5601"  # Порт Kibana
    networks:
      - logging

networks:
  monitoring:
  logging:
